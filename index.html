<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gin & Us</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap');
        body { background: #064e3b; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Poppins', sans-serif; color: #FDFDD0; }
        .app-container { background: rgba(2, 44, 34, 0.95); padding: 25px; border-radius: 40px; text-align: center; width: 85%; max-width: 380px; border: 1.5px solid #FDFDD0; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        
        /* Gin Section */
        .kitten-box { background: rgba(253, 253, 208, 0.1); border-radius: 25px; padding: 15px; margin-bottom: 20px; border: 1px dashed #FFA500; }
        #kitten-emoji { font-size: 70px; display: block; margin: 10px 0; color: #FFA500; }
        .stats { font-size: 0.8rem; margin-bottom: 10px; }
        
        /* Interaction Buttons */
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .small-btn { background: #10b981; color: #FDFDD0; border: none; padding: 10px; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 0.8rem; }
        
        /* Main Action Buttons */
        .big-heart-btn { 
            background: #FDFDD0; color: #064e3b; width: 100%; font-family: 'Dancing Script', cursive; 
            font-size: 1.8rem; border: none; padding: 12px; border-radius: 20px; cursor: pointer; margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .msg-send-btn { background: #10b981; color: white; border: none; width: 100%; padding: 12px; border-radius: 15px; font-weight: 600; cursor: pointer; }
        
        input { width: 90%; background: rgba(253, 253, 208, 0.1); border: 1px solid #FDFDD0; padding: 12px; border-radius: 15px; color: #FDFDD0; margin-bottom: 10px; text-align: center; }
        .identity-box { font-size: 0.8rem; margin-bottom: 15px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 10px; }
        #status-msg { font-size: 0.7rem; margin-top: 15px; color: #FFA500; min-height: 15px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="identity-box">
        Running as: <b><span id="display-name">...</span></b>
        <br><button onclick="switchUser()" style="background:none; border:none; color:#10b981; font-size:0.7rem; text-decoration:underline;">(Switch User)</button>
    </div>

    <div class="kitten-box">
        <span id="kitten-emoji">🐈</span>
        <h2 style="margin:0; color:#FFA500; font-size: 1.2rem;">Gin</h2>
        <div class="stats">Hunger: <span id="hunger">100</span>% | Love: <span id="love">100</span>%</div>
        <div class="btn-row">
            <button class="small-btn" onclick="care('feed')">🍖 Feed</button>
            <button class="small-btn" onclick="care('pet')">✋ Pet</button>
        </div>
    </div>

    <button class="big-heart-btn" onclick="sendQuickPing()">Send Heartbeat ❤️</button>

    <div style="border-top: 1px solid rgba(253,253,208,0.2); padding-top: 15px;">
        <input type="text" id="customMsg" placeholder="Type a message...">
        <button class="msg-send-btn" onclick="sendMessage()">Send Message</button>
    </div>

    <p id="status-msg"></p>
</div>
