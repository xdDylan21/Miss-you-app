<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gin & Us</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap');
        body { background: #064e3b; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Poppins', sans-serif; color: #FDFDD0; text-align: center; }
        .box { background: rgba(2, 44, 34, 0.95); padding: 30px; border-radius: 40px; width: 85%; max-width: 350px; border: 1.5px solid #FDFDD0; }
        .kitten { font-size: 70px; display: block; margin: 10px; color: #FFA500; }
        .btn { background: #FDFDD0; color: #064e3b; width: 100%; font-family: 'Dancing Script', cursive; font-size: 1.8rem; border: none; padding: 12px; border-radius: 20px; cursor: pointer; margin-top: 15px; }
        input { width: 90%; background: rgba(253, 253, 208, 0.1); border: 1px solid #FDFDD0; padding: 12px; border-radius: 15px; color: #FDFDD0; margin-top: 20px; text-align: center; }
        .user-btn { background: #10b981; color: white; border: none; padding: 5px 15px; border-radius: 10px; margin-bottom: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="box">
    <button class="user-btn" id="whoAmI" onclick="toggleUser()">I am: DYLAN</button>

    <div style="border: 1px dashed #FFA500; border-radius: 20px; padding: 10px; margin-bottom: 20px;">
        <span class="kitten">🐈</span>
        <h2 style="margin:0; color:#FFA500;">Gin</h2>
        <p style="font-size: 0.8rem;">Hunger: 100% | Love: 100%</p>
    </div>

    <button class="btn" onclick="send('Misses you! ❤️')">Send Heartbeat ❤️</button>
    
    <input type="text" id="myMsg" placeholder="Type a message...">
    <button style="background:#10b981; color:white; width:100%; border:none; padding:12px; border-radius:15px; margin-top:10px; font-weight:bold;" onclick="send(document.getElementById('myMsg').value)">Send Message</button>
    
    <p id="status" style="font-size: 0.7rem; margin-top: 15px; color: #FFA500;"></p>
</div>

<script>
    let me = "dylan";

    function toggleUser() {
        me = (me === "dylan") ? "xena" : "dylan";
        document.getElementById('whoAmI').innerText = "I am: " + me.toUpperCase();
    }

    async function send(text) {
        if (!text) return;
        const status = document.getElementById('status');
        const topic = (me === "dylan") ? "xena_alerts_2026" : "dylan_alerts_2026";
        const sender = (me === "dylan") ? "Dylan" : "Xena";

        status.innerText = "Sending...";

        try {
            await fetch(`https://ntfy.sh/${topic}`, {
                method: 'POST',
                body: sender + ": " + text
            });
            status.innerText = "Sent! ❤️";
            document.getElementById('myMsg').value = "";
        } catch (e) {
            status.innerText = "Failed. Check internet.";
        }
    }
</script>

</body>
</html>
